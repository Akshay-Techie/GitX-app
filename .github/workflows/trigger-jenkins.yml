# ════════════════════════════════════════════════
# GitX — GitHub Actions Workflow
# Triggers Jenkins pipeline automatically on push
# Author: Akshay-Techie
# ════════════════════════════════════════════════

name: Trigger Jenkins Pipeline

on:
  # Triggers automatically on every push to main
  push:
    branches:
      - main

jobs:
  trigger-jenkins:
    name: Trigger Jenkins CI
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Print commit information
      - name: Show commit info
        run: |
          echo "🚀 Push detected on main branch"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          echo "💬 Message: ${{ github.event.head_commit.message }}"

      # Step 2 — Get Jenkins CSRF crumb for security
      - name: Get Jenkins Crumb
        id: crumb
        run: |
          echo "🔐 Getting Jenkins CSRF crumb..."
          CRUMB=$(curl -s --user \
            "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            "${{ secrets.JENKINS_URL }}/crumbIssuer/api/json" \
            | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['crumb'])")
          echo "crumb=$CRUMB" >> $GITHUB_OUTPUT
          echo "✅ Crumb obtained"

      # Step 3 — Trigger Jenkins pipeline via REST API
      - name: Trigger Jenkins Pipeline
        run: |
          echo "⚡ Triggering Jenkins pipeline..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            -H "Jenkins-Crumb: ${{ steps.crumb.outputs.crumb }}" \
            -X POST \
            "${{ secrets.JENKINS_URL }}/job/gitx-pipeline/build")

          echo "📡 Jenkins response: $HTTP_CODE"

          if [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Jenkins pipeline triggered successfully!"
          else
            echo "❌ Failed to trigger Jenkins. Code: $HTTP_CODE"
            exit 1
          fi

      # Step 4 — Wait and confirm
      - name: Confirm Pipeline Started
        run: |
          echo "⏳ Waiting for Jenkins to start pipeline..."
          sleep 10
          echo "✅ Done! Check Jenkins dashboard:"
          echo "🔗 ${{ secrets.JENKINS_URL }}/job/gitx-pipeline"